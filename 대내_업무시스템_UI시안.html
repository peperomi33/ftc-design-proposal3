<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대내 업무시스템 UI 시안 — 공정거래위원회 온라인사건·심의포털</title>
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('font/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
:root{
  --brand:#1C60EF;          /* A.MATE / 공정위 메인 블루 */
  --brand-weak:#DBE8FE;     /* 연블루 서피스 */
  --brand-ink:#0E3FA8;      /* 진한 블루 (강조 텍스트) */
  --ink:#15192B;            /* 본문 잉크 */
  --ink-2:#5A6175;          /* 보조 텍스트 */
  --ink-3:#9098AD;          /* 캡션/비활성 */
  --bg:#F5F6F9;             /* 페이지 배경 */
  --surface:#FFFFFF;        /* 패널 */
  --line:#E4E7EE;           /* 구분선 */
  --line-strong:#D2D7E2;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(21,25,43,.04), 0 12px 32px rgba(21,25,43,.07);
  --font:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--bg);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;max-width:100%;}

/* ---------- 공통 헤더 ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:16px;
  height:64px;padding:0 28px;
  background:rgba(255,255,255,.86);
  backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.02em;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px var(--brand-weak);}
.brand .sub{font-weight:600;color:var(--ink-3);font-size:13px;letter-spacing:0;}
.topbar .spacer{flex:1;}
.topbar .meta{font-size:12.5px;color:var(--ink-2);font-weight:500;}

/* ---------- 뷰 전환 ---------- */
.view{display:none;}
.view.active{display:block;}

/* ================= 메인(목록) 뷰 ================= */
.hero{padding:54px 28px 30px;max-width:1180px;margin:0 auto;}
.hero .eyebrow{
  display:inline-block;font-size:12px;font-weight:700;letter-spacing:.14em;
  color:var(--brand-ink);background:var(--brand-weak);
  padding:6px 12px;border-radius:999px;text-transform:uppercase;
}
.hero h1{
  margin:18px 0 10px;font-size:34px;line-height:1.22;
  letter-spacing:-.03em;font-weight:800;
}
.hero p{margin:0;max-width:640px;color:var(--ink-2);font-size:15.5px;}

.cards{
  max-width:1180px;margin:0 auto;padding:8px 28px 70px;
  display:grid;grid-template-columns:repeat(2,1fr);gap:26px;
}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  text-align:left;display:flex;flex-direction:column;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 44px rgba(21,25,43,.13);border-color:var(--line-strong);}
.card:focus-visible{outline:3px solid var(--brand);outline-offset:3px;}
.card .thumb{aspect-ratio:16/10;background:var(--brand-weak);overflow:hidden;}
.card .thumb img{width:100%;height:100%;object-fit:cover;}
.card .body{padding:20px 22px 22px;}
.card .tag{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.04em;}
.card h2{margin:6px 0 6px;font-size:22px;font-weight:800;letter-spacing:-.02em;}
.card .card-concept{margin:0 0 10px;font-size:13.5px;font-weight:700;color:var(--ink);}
.card .card-detail{margin:0 0 14px;font-size:13.5px;color:var(--ink-2);line-height:1.65;}
.card .card-bullets{margin:0 0 4px;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px;}
.card .card-bullets li{position:relative;padding-left:18px;font-size:13px;color:var(--ink);line-height:1.5;}
.card .card-bullets li::before{content:'';position:absolute;left:2px;top:7px;width:6px;height:6px;border-radius:2px;background:var(--brand);}
.card .more{
  margin-top:16px;display:inline-flex;align-items:center;gap:6px;
  color:var(--brand);font-weight:700;font-size:13.5px;
}
.card .more::after{content:'→';transition:transform .2s ease;}
.card:hover .more::after{transform:translateX(4px);}

/* ================= 상세 뷰 ================= */
.detail-head{
  position:sticky;top:64px;z-index:30;
  display:flex;align-items:center;gap:18px;
  padding:16px 28px;background:rgba(245,246,249,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
}
.back{
  display:inline-flex;align-items:center;gap:7px;
  font-weight:700;font-size:14px;color:var(--ink-2);
  padding:8px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);transition:.18s;
}
.back:hover{color:var(--brand);border-color:var(--brand);}
.detail-head .title{font-size:18px;font-weight:800;letter-spacing:-.02em;}
.detail-head .concept{font-size:13px;color:var(--ink-2);}

.stage{
  display:grid;grid-template-columns:236px minmax(0,1fr) 360px;
  gap:0;width:100%;height:calc(100vh - 64px - 65px);overflow:hidden;
}

/* --- 좌측 시나리오 레일(시그니처) --- */
.rail{border-right:1px solid var(--line);padding:24px 16px;background:var(--surface);overflow-y:auto;min-height:0;}
.rail .rail-label{
  font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--ink-3);
  padding:0 8px 12px;text-transform:uppercase;
}
.scn{
  display:flex;flex-direction:column;align-items:flex-start;gap:4px;width:100%;text-align:left;
  padding:11px 12px;border-radius:var(--radius-sm);margin-bottom:2px;
  color:var(--ink-2);transition:background .16s, color .16s;
}
.scn:hover{background:var(--bg);}
.scn .scn-top{display:flex;align-items:center;gap:8px;}
.scn .num{
  flex:0 0 auto;width:24px;height:24px;border-radius:7px;
  display:grid;place-items:center;font-size:12.5px;font-weight:700;
  font-variant-numeric:tabular-nums;
  background:var(--bg);color:var(--ink-2);border:1px solid var(--line);
  transition:.16s;
}
.scn .scn-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;}
.scn .scn-sub{font-size:11.5px;color:var(--ink-3);padding-left:2px;}
.scn.on{background:var(--brand);}
.scn.on .scn-name,.scn.on .scn-sub{color:#fff;}
.scn.on .num{background:#fff;color:var(--brand);border-color:#fff;}

/* --- 가운데 뷰어 --- */
.viewer{padding:28px 30px;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;}
.viewer .vtop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.viewer .vtop .vname{font-size:15px;font-weight:800;letter-spacing:-.01em;}
.subtoggle{display:inline-flex;gap:4px;background:var(--bg);padding:4px;border-radius:999px;border:1px solid var(--line);}
.subtoggle button{
  padding:7px 15px;border-radius:999px;font-size:12.5px;font-weight:700;color:var(--ink-2);transition:.16s;
}
.subtoggle button.on{background:var(--surface);color:var(--brand);box-shadow:0 1px 3px rgba(21,25,43,.12);}
.frame{
  position:relative;flex:1;min-height:0;
  align-self:center;max-width:100%;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;display:grid;place-items:center;box-shadow:var(--shadow);cursor:pointer;
}
.frame img{height:100%;width:auto;max-width:100%;object-fit:contain;background:#fff;display:block;}
.frame .zoom-hint{
  position:absolute;right:14px;bottom:14px;
  font-size:12px;font-weight:600;color:#fff;
  background:rgba(21,25,43,.62);padding:7px 12px;border-radius:999px;
  display:inline-flex;align-items:center;gap:6px;pointer-events:none;
  opacity:0;transition:opacity .2s;
}
.frame:hover .zoom-hint{opacity:1;}
.viewer .vnav{display:flex;justify-content:space-between;margin-top:16px;}
.vnav button{
  display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;
  color:var(--ink-2);padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:var(--surface);transition:.16s;
}
.vnav button:hover:not(:disabled){color:var(--brand);border-color:var(--brand);}
.vnav button:disabled{opacity:.35;cursor:default;}

/* --- 우측 설명 --- */
.desc{border-left:1px solid var(--line);padding:28px 28px;background:var(--surface);overflow-y:auto;min-height:0;}
.desc .d-num{font-size:12px;font-weight:700;color:var(--brand);letter-spacing:.08em;font-variant-numeric:tabular-nums;}
.desc h3{margin:8px 0 14px;font-size:21px;font-weight:800;letter-spacing:-.02em;}
.desc .d-body{color:var(--ink-2);font-size:14.5px;line-height:1.72;}
.desc .feat-label{margin:24px 0 10px;font-size:12px;font-weight:700;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;}
.desc ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
.desc li{position:relative;padding-left:22px;font-size:14px;color:var(--ink);line-height:1.55;}
.desc li::before{
  content:'';position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;
  background:var(--brand);
}

/* ================= 라이트박스 ================= */
.lightbox{
  position:fixed;inset:0;z-index:90;display:none;
  background:rgba(11,14,24,.92);place-items:center;padding:40px;
}
.lightbox.open{display:grid;}
.lightbox img{
  max-width:96vw;max-height:90vh;object-fit:contain;border-radius:8px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);cursor:pointer;
}
/* 시퀀스 크로스페이드용 상단 레이어 — 검은 화면 없이 새 이미지를 겹쳐 전환 */
#lbImg2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;transition:opacity .24s ease;}
#lbImg2.show{opacity:1;}
.lb-close{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  padding:10px 32px;border-radius:999px;border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.14);color:#fff;font-size:14px;font-weight:600;letter-spacing:.04em;transition:.16s;}
.lb-close:hover{background:rgba(255,255,255,.26);}
.lb-cap{display:none;}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.12);color:#fff;font-size:24px;display:grid;place-items:center;transition:.16s;}
.lb-arrow:hover{background:rgba(255,255,255,.24);}
.lb-arrow.prev{left:26px;} .lb-arrow.next{right:26px;}
.lb-arrow[hidden]{display:none;}

/* ================= 반응형 ================= */
@media (max-width:1100px){
  .stage{grid-template-columns:1fr;height:auto;overflow:visible;}
  .rail{border-right:none;border-bottom:1px solid var(--line);padding:14px 18px;overflow:visible;}
  .viewer{overflow:visible;}
  .rail .scn-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .rail .rail-label{display:none;}
  .scn{flex:0 0 auto;width:auto;margin:0;white-space:nowrap;}
  .scn .scn-sub{display:none;}
  .desc{border-left:none;border-top:1px solid var(--line);overflow:visible;}
  .frame{min-height:300px;}
}
@media (max-width:680px){
  .cards{grid-template-columns:1fr;}
  .hero h1{font-size:26px;}
  .topbar{padding:0 18px;}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>

<!-- 상단 바 -->
<header class="topbar">
  <div class="brand" id="brandBtn" style="cursor:pointer"><span class="dot"></span>공정거래위원회 온라인사건·심의포털 구축 프로젝트</div>
  <div class="spacer"></div>
  <div class="meta">대내 업무시스템 화면 디자인 시안 제안</div>
</header>

<!-- ===== 메인(목록) 뷰 ===== -->
<section id="mainView" class="view active">
  <div class="hero">
    <span class="eyebrow">대내 업무시스템 · Design Proposal</span>
    <h1>온라인사건·심의포털 대내 시스템<br>화면 디자인 시안</h1>
    <p>두 가지 방향(A안·B안)의 시안입니다. 카드를 선택하면 화면 시나리오별 시안과 설명을 확인할 수 있고,<br>이미지를 누르면 원본 크기로 볼 수 있습니다.</p>
  </div>
  <div class="cards" id="cardGrid"></div>
</section>

<!-- ===== 상세 뷰 ===== -->
<section id="detailView" class="view">
  <div class="detail-head">
    <div>
      <div class="title" id="dTitle"></div>
      <div class="concept" id="dConcept"></div>
    </div>
  </div>

  <div class="stage">
    <!-- 좌측 시나리오 레일 -->
    <nav class="rail">
      <div class="rail-label">화면 시나리오</div>
      <div class="scn-list" id="scnList"></div>
    </nav>

    <!-- 가운데 뷰어 -->
    <div class="viewer">
      <div class="vtop">
        <div class="vname" id="vName"></div>
        <div class="subtoggle" id="subToggle"></div>
      </div>
      <button class="frame" id="frame" aria-label="이미지를 눌러 크게 보기">
        <img id="frameImg" alt="">
        <span class="zoom-hint">🔍 클릭하면 크게 보기</span>
      </button>
    </div>

    <!-- 우측 설명 -->
    <aside class="desc">
      <div class="d-num" id="dScnNum"></div>
      <h3 id="dScnName"></h3>
      <div class="d-body" id="dScnBody"></div>
      <div class="feat-label" id="dFeatLabel">주요 특징</div>
      <ul id="dFeatList"></ul>
    </aside>
  </div>
</section>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="이미지 원본 보기">
  <button class="lb-close" id="lbClose" aria-label="닫기">닫기</button>
  <button class="lb-arrow prev" id="lbPrev" aria-label="이전 이미지">‹</button>
  <img id="lbImg" alt="">
  <img id="lbImg2" alt="" aria-hidden="true">
  <button class="lb-arrow next" id="lbNext" aria-label="다음 이미지">›</button>
  <div class="lb-cap" id="lbCap"></div>
</div>

<script>
/* ============================================================
   시안 데이터 — 여기만 수정하면 화면이 자동으로 구성됩니다.
   - images: 한 시나리오에 화면이 여러 장이면 배열에 추가
     (예: 2뎁스/3뎁스). 2장 이상이면 뷰어에 서브 토글이 생깁니다.
   - src: images/파일명.png (이 파일과 같은 위치의 images 폴더)
   - 파일이 없으면 라벨이 적힌 플레이스홀더가 자동 표시됩니다.
   ============================================================ */
const DATA = [
  {
    id:'A', tag:'대내 시스템 디자인 시안', title:'A안', concept:'넓게 보고, 깊게 다룬다',
    detail:'화면 폭 전체를 데이터에 활용하는 Wide Layout입니다. 표와 목록이 많은 심결·배당 업무에 최적화된 구조로, 안건배당 10,000건도 가로 스크롤 없이 한눈에 확인할 수 있습니다.',
    bullets:['상단 와이드 GNB — 화면 폭 전체를 콘텐츠 영역으로 활용','MDI 바 하단 배치 — 콘텐츠 상단 시야 확보','대용량 목록 가로 스크롤 없이 한눈에','심결·배당 업무 집중 환경에 적합'],
    thumb:'images/a-01.png',
    scenarios:[
      {
        name:'컨셉 소개', sub:'넓게 보고, 깊게 다룬다',
        images:[{src:'images/a-01.png', cap:'A안 · 컨셉 소개'}],
        body:'A안의 핵심 컨셉은 "넓게 보고, 깊게 다룬다"입니다. 가장 큰 특징은 메뉴를 상단에 가로로 길게 배치했다는 점입니다. 보통 좌측 메뉴가 차지하던 공간을 콘텐츠에 모두 내어줬기 때문에 화면 폭 전체를 데이터 표시에 활용할 수 있습니다. 안건배당 목록처럼 만 건 단위의 데이터를 다룰 때 열이 많아도 가로 스크롤 없이 한눈에 담깁니다. MDI 바는 화면 하단에 두었습니다. 작업 창을 여러 개 열어두더라도 콘텐츠 상단 시야를 가리지 않고, 창 전환은 화면 아래에서 처리합니다. 많은 데이터를 동시에 비교하고 깊이 들여다봐야 하는 심결·배당 업무 중심 사용자에게 가장 적합한 안입니다.',
        features:['레이아웃 — 상단 와이드 GNB, 화면 폭 전체를 콘텐츠에 할당','MDI 바 — 화면 하단 배치, 콘텐츠 상단 시야를 가리지 않음','강점 — 대용량 목록(안건배당 10,000건)을 가로 스크롤 없이 한눈에','적합 환경 — 데이터를 동시에 비교·검토하는 심결·배당 업무 중심 사용자']
      },
      {
        name:'기본화면', sub:'로그인 후 진입 화면',
        images:[{src:'images/a-01.png', cap:'A안 · 기본화면'}],
        body:'로그인 후 진입하는 기본 업무 화면입니다. 좌측 3뎁스 GNB, 상단 영역, 중앙 콘텐츠 영역으로 구성되어 핵심 업무 동선을 한 화면에서 처리합니다.',
        features:['좌측 GNB 3뎁스 메뉴 구조','상단 검색·바로가기 영역','중앙 메인 콘텐츠(목록/대시보드)']
      },
      {
        name:'뎁스 선택', sub:'2뎁스 선택',
        images:[{src:'images/a-02.png', cap:'A안 · 2뎁스 선택'}],
        clickSeq:[{src:'images/a-01.png', cap:'A안 · 기본화면'},{src:'images/a-02.png', cap:'A안 · 2뎁스 선택'}],
        body:'좌측 GNB에서 상위 메뉴를 선택하면 2뎁스가 펼쳐지는 단계적 탐색 구조입니다.',
        features:['선택 단계에 따른 메뉴 확장','현재 위치 시각적 강조','3뎁스까지 일관된 인터랙션']

/* ---------- 이미지 없을 때 플레이스홀더(SVG) ---------- */
function placeholder(label){
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
      <rect width="1280" height="800" fill="#F0F3FA"/>
      <rect x="40" y="40" width="1200" height="720" rx="18" fill="#FFFFFF" stroke="#DBE8FE" stroke-width="2"/>
      <rect x="40" y="40" width="1200" height="74" rx="18" fill="#DBE8FE"/>
      <circle cx="640" cy="360" r="46" fill="none" stroke="#1C60EF" stroke-width="6"/>
      <line x1="674" y1="394" x2="712" y2="432" stroke="#1C60EF" stroke-width="8" stroke-linecap="round"/>
      <text x="640" y="470" font-family="sans-serif" font-size="30" font-weight="700" fill="#1C60EF" text-anchor="middle">${label}</text>
      <text x="640" y="510" font-family="sans-serif" font-size="18" fill="#9098AD" text-anchor="middle">이미지를 images 폴더에 넣어주세요</text>
    </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}
function bindFallback(img, label){
  img.onerror = function(){ this.onerror = null; this.src = placeholder(label); };
}

/* ---------- 시나리오 선택 ---------- */
function selectScenario(si){
  cur.s = si; cur.i = 0;
  const p = DATA[cur.p], s = p.scenarios[si];

  document.querySelectorAll('#scnList .scn').forEach((el, idx) =>
    el.classList.toggle('on', idx === si));

  document.getElementById('vName').textContent = s.name;

  // 서브 토글(화면 2장 이상이고 loop 시나리오가 아닐 때만)
  const toggle = document.getElementById('subToggle');
  toggle.innerHTML = '';
  if (s.images.length > 1 && !s.loop){
    toggle.style.display = 'inline-flex';
    s.images.forEach((im, ii) => {
      const b = document.createElement('button');
      b.textContent = im.cap.split('·').pop().trim();
      b.addEventListener('click', () => selectImage(ii));
      toggle.appendChild(b);
    });
  } else {
    toggle.style.display = 'none';
  }

  // 설명
  document.getElementById('dScnNum').textContent = `SCENARIO ${String(si+1).padStart(2,'0')}`;
  document.getElementById('dScnName').textContent = s.name;
  document.getElementById('dScnBody').textContent = s.body || '';
  const feats = s.features || [];
  document.getElementById('dFeatLabel').style.display = feats.length ? 'block' : 'none';
  const ul = document.getElementById('dFeatList');
  ul.innerHTML = feats.map(f => `<li>${f}</li>`).join('');

  // 이전/다음 버튼
  selectImage(0);
}

/* ---------- 이미지(서브) 선택 ---------- */
function selectImage(ii){
  cur.i = ii;
  const s = DATA[cur.p].scenarios[cur.s];
  const im = s.images[ii];
  const img = document.getElementById('frameImg');
  bindFallback(img, im.cap);
  img.src = im.src;
  img.alt = im.cap;
  document.querySelectorAll('#subToggle button').forEach((b, idx) =>
    b.classList.toggle('on', idx === ii));
  requestAnimationFrame(fitFrameToImage);
}

/* ---------- 가운데 버튼 폭을 실제 렌더된 이미지 폭에 맞춤 (양옆 여백 제거) ---------- */
function fitFrameToImage(){
  const frame = document.getElementById('frame');
  const img = document.getElementById('frameImg');
  if (!frame || !img || !img.naturalWidth || !img.naturalHeight) return;
  frame.style.width = '';                 // CSS 기본 폭으로 되돌려 가용 영역 측정
  const availH = frame.clientHeight;       // 이미지(height:100%)가 실제 채우는 높이
  const availW = frame.clientWidth;        // 현재 가용 폭(여백 포함)
  if (!availH || !availW) return;          // 화면이 숨겨져 있으면 보류
  const ar = img.naturalWidth / img.naturalHeight;
  let dispW = availH * ar;                  // object-fit:contain 으로 실제 보이는 폭
  if (dispW > availW) dispW = availW;       // 폭이 더 좁은 경우(세로가 남는 경우) 보호
  const cs = getComputedStyle(frame);
  const bx = parseFloat(cs.borderLeftWidth) + parseFloat(cs.borderRightWidth);
  frame.style.width = Math.round(dispW + bx) + 'px';   // border-box 기준
}
(function bindFrameFit(){
  const img = document.getElementById('frameImg');
  if (img) img.addEventListener('load', () => requestAnimationFrame(fitFrameToImage));
  let rafId = null;
  window.addEventListener('resize', () => {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(fitFrameToImage);
  });
})();

/* ---------- 전체화면(Fullscreen) 유틸 ---------- */
function requestFs(el){
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (fn){ try { const p = fn.call(el); if (p && p.catch) p.catch(()=>{}); } catch(e){} }
}
function exitFs(){
  const d = document;
  if (d.fullscreenElement || d.webkitFullscreenElement || d.msFullscreenElement){
    const fn = d.exitFullscreen || d.webkitExitFullscreen || d.msExitFullscreen;
    if (fn){ try { fn.call(d); } catch(e){} }
  }
}
function closeLightbox(){
  clearSeq();
  lightbox.classList.remove('open');
  resetFrameToFirst();
}
/* 라이트박스를 닫고 상세 화면으로 복귀할 때 가운데 이미지를 첫 화면으로 되돌림 */
function resetFrameToFirst(){
  if (cur.i !== 0) selectImage(0);
}
/* 네이티브 전체화면이 ESC 등으로 해제되면 라이트박스도 함께 닫기 */
['fullscreenchange','webkitfullscreenchange','msfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
    if (!fsEl && lightbox.classList.contains('open')){
      clearSeq();
      lightbox.classList.remove('open');
      resetFrameToFirst();
    }
  })
);

function openLightbox(){
  const s = DATA[cur.p].scenarios[cur.s];
  if (s.clickSeq && s.clickSeq.length){
    startClickSeq(s);
    return;
  }
  renderLb();
  const multi = s.images.length > 1;
  lbPrev.hidden = !multi; lbNext.hidden = !multi;
  lightbox.classList.add('open');
}

function startClickSeq(s){
  seqList = s.clickSeq; seqI = 0;
  lbPrev.hidden = true; lbNext.hidden = true;   // 클릭 전환 모드 — 좌우 화살표 숨김
  seqSet(seqList[0]);
  lightbox.classList.add('open');
}
/* 페이드 없이 즉시 이미지 설정 (최초 1장 / 하단 레이어 동기화) */
function seqSet(im){
  bindFallback(lbImg, im.cap || '');
  lbImg.src = im.src; lbImg.alt = im.cap || '';
  lbCap.textContent = im.cap || '';
}
/* 이미지 즉시 전환 */
function seqShow(idx){
  seqI = idx;
  seqSet(seqList[seqI]);
}
/* 클릭/화살표로만 다음 화면 (마지막이면 처음으로 되돌아가 무한 루프 — 자동 전환 없음) */
function seqAdvance(dir){
  seqI = (seqI + dir + seqList.length) % seqList.length;
  seqShow(seqI);
}
function clearSeq(){ clearTimeout(seqTimer); seqList = null; lbImg2.classList.remove('show'); lbImg2.removeAttribute('src'); }
function renderLb(){
  const s = DATA[cur.p].scenarios[cur.s];
  const im = s.images[cur.i];
  lbImg.onerror = function(){
    this.onerror = null;
    closeLightbox();
    if (cur.i > 0) cur.i--;
    selectImage(cur.i);
  };
  lbImg.src = im.src; lbImg.alt = im.cap;
  lbCap.textContent = im.cap;
}
function lbStep(d){
  const s = DATA[cur.p].scenarios[cur.s];
  cur.i = (cur.i + d + s.images.length) % s.images.length;
  selectImage(cur.i); renderLb();
}
document.getElementById('frame').addEventListener('click', openLightbox);
document.getElementById('lbClose').addEventListener('click', () => closeLightbox());
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
lbPrev.addEventListener('click', e => { e.stopPropagation(); lbStep(-1); });
lbNext.addEventListener('click', e => { e.stopPropagation(); lbStep(1); });
lbImg.addEventListener('click', e => {
  e.stopPropagation();
  if (seqList){
    seqAdvance(1);   // 다음 화면으로 (마지막이면 처음으로 루프 — 닫지 않음)
    return;
  }
  const s = DATA[cur.p].scenarios[cur.s];
  if (s.loop) {
    if (cur.i < s.images.length - 1) {
      cur.i += 1;
      selectImage(cur.i);
      renderLb();
    } else {
      closeLightbox();
    }
  } else if (cur.i < s.images.length - 1) {
    lbStep(1);
  } else {
    closeLightbox();
  }
});

/* ---------- 키보드 ---------- */
document.addEventListener('keydown', e => {
  if (lightbox.classList.contains('open')){
    if (e.key === 'Escape') { closeLightbox(); return; }
    if (seqList){
      if (e.key === 'ArrowRight') seqAdvance(1);
      if (e.key === 'ArrowLeft')  seqAdvance(-1);
      return;
    }
    if (e.key === 'ArrowLeft') lbStep(-1);
    if (e.key === 'ArrowRight') lbStep(1);
    return;
  }
  if (detailView.classList.contains('active')){
    if (e.key === 'ArrowLeft' && cur.s > 0) selectScenario(cur.s - 1);
    if (e.key === 'ArrowRight' && cur.s < DATA[cur.p].scenarios.length - 1) selectScenario(cur.s + 1);
  }
});
</script>
